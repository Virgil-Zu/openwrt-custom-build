
name: openwrt-build-github-actions

# 4C/16GRAM/14GSSD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.set-matrix.outputs.version }}
    steps:
      - name: checkout
        uses: actions/checkout@main
      - name: set-matrix
        id: set-matrix
        run: |
          targets=$(sed -e '/^#/d' -e '/^$/d' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*,*$//' targets.txt | jq -R . | jq -sc .)
          echo "matrix={\"target\":$targets}" >> $GITHUB_OUTPUT
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

  build:
    needs: targets
    runs-on: ubuntu-20.04
    strategy:
      matrix: ${{fromJson(needs.targets.outputs.matrix)}}
    steps:
      - name: checkout
        uses: actions/checkout@main
      - name: clean-system
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      - name: install-buildsystem
        run: |
          # whoami => runner
          # pwd => /home/runner/work/openwrt-custom-build/openwrt-custom-build
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo apt update
          
          cd /tmp
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar xzf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --enable-optimizations --disable-ssl
          sudo make altinstall
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python
          sudo ln -sf /usr/local/bin/python2.7-config /usr/bin/python2-config
          python2 --version
          python --version
          
          sudo apt-get autoremove --purge
          sudo apt-get clean
          mkdir -p bin
      - name: clone-openwrt
#        run: git clone -b ${{ needs.targets.outputs.version }} https://github.com/openwrt/openwrt.git
        uses: actions/checkout@main
        with:
          repository: openwrt/openwrt
          ref: ${{ needs.targets.outputs.version }}
          path: openwrt
      - name: update-feeds
        working-directory: openwrt
        run: ./scripts/feeds update -a
      - name: install-feeds
        working-directory: openwrt
        run: ./scripts/feeds install -a
      - name: config-targets
        run: bash ./config.sh ${{ needs.targets.outputs.version }} ${{ matrix.target }}
      - name: build-targets
        id: build-step
        run: |
          bash ./build.sh ${{ needs.targets.outputs.version }} ${{ matrix.target }}
          echo "artifact_name=$(tmp="${{ matrix.target }}"; tmp="${tmp//\"/}"; echo "${tmp##*/}")" >> $GITHUB_OUTPUT
      - name: summary-information
        run: |
          tree -L 3 openwrt/bin/targets
          ls -l bin
          df -h
      - name: upload-artifact
        if: steps.build-step.conclusion == 'success'
        uses: actions/upload-artifact@main
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          name: ${{ steps.build-step.outputs.artifact_name }}
          path: bin/*-squashfs-sysupgrade.bin
          retention-days: 3

  release:
    runs-on: ubuntu-latest
    needs: [targets, build]
    if: github.ref_type == 'tag'
    steps:
      - name: download-artifact
        uses: actions/download-artifact@main
        with:
          path: bin
      - name: summary
        run: |
          tree -L 3 bin
          find bin -mindepth 2 -type f -name "*-squashfs-sysupgrade.bin" -exec cp -f {} bin/ \;
          ls -l bin
      - name: create-release
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          tag_name: ${{ needs.targets.outputs.version }}
          body_path: version.txt
          draft: false
          prerelease: false
          files: bin/*-squashfs-sysupgrade.bin
      - name: delete-workflow-runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 5

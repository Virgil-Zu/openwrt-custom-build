
name: openwrt-build-github-actions

# 4C/16GRAM/14GSSD
# whoami => runner
# pwd => /home/runner/work/openwrt-custom-build/openwrt-custom-build


on:
  workflow_dispatch:
  push:
#    tags:
#      - "v*"

jobs:
  targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.set-matrix.outputs.version }}
      workspace: ${{ steps.set-matrix.outputs.version }}
    steps:
      - name: checkout
        uses: actions/checkout@main
      - name: set-matrix
        id: set-matrix
        run: |
          targets=$(sed -e '/^#/d' -e '/^$/d' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*,*$//' targets.txt | jq -R . | jq -sc .)
          echo "matrix={\"target\":$targets}" >> $GITHUB_OUTPUT
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

  build:
    needs: targets
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.targets.outputs.matrix) }}
    steps:
      - name: checkout
        uses: actions/checkout@main
      - name: clean-system
        run: |
          df -h
          sudo apt-get autoremove --purge
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
      - name: build-targets
        id: build-step
        uses: docker://ubuntu:18.04
        with:
            entrypoint: /bin/bash
            args: |
              -c "
              # whoami => root
              # pwd => /github/workspace
              apt update
              apt upgrade -y
              apt install -y sudo build-essential ccache ecj fastjar file g++ gawk gettext git java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev libssl-dev python python2.7-dev python3 unzip wget python3-distutils python3-setuptools python3-dev rsync subversion swig time xsltproc zlib1g-dev 
              apt-get autoremove --purge
              apt-get clean
              rm -rf /etc/apt/sources.list.d/*
              apt update
              mkdir -p bin
              RUNNER_UID=$(stat -c '%u' $GITHUB_WORKSPACE)
              useradd -u $RUNNER_UID -M -s /bin/bash runner
              runuser -u runner -- git clone -b ${{ needs.targets.outputs.version }} https://github.com/openwrt/openwrt.git
              runuser -u runner -- ./scripts/feeds update -a
              runuser -u runner -- ./scripts/feeds install -a
              runuser -u runner -- bash ./config.sh "${{ needs.targets.outputs.version }}" "${{ matrix.target }}"
              runuser -u runner -- bash ./build.sh "${{ needs.targets.outputs.version }}" "${{ matrix.target }}"
              echo "artifact_name=$(tmp="${{ matrix.target }}"; tmp="${tmp//\"/}"; echo "${tmp##*/}")" >> $GITHUB_OUTPUT
              "
      - name: summary-information
        run: |
          tree -L 3 openwrt/bin/targets
          ls -l bin
          df -h
      - name: upload-artifact
        if: steps.build-step.conclusion == 'success'
        uses: actions/upload-artifact@main
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          name: ${{ steps.build-step.outputs.artifact_name }}
          path: bin/*-squashfs-sysupgrade.bin
          retention-days: 3

  release:
    runs-on: ubuntu-latest
    needs: [targets, build]
    if: github.ref_type == 'tag'
    defaults:
      run:
        working-directory: /home/runner/repo
    steps:
      - name: download-artifact
        uses: actions/download-artifact@main
        with:
          path: bin
      - name: summary
        run: |
          tree -L 3 bin
          find bin -mindepth 2 -type f -name "*-squashfs-sysupgrade.bin" -exec cp -f {} bin/ \;
          ls -l bin
      - name: create-release
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          tag_name: ${{ needs.targets.outputs.version }}
          body_path: version.txt
          draft: false
          prerelease: false
          files: bin/*-squashfs-sysupgrade.bin
      - name: delete-workflow-runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 5
